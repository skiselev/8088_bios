name: GitHub Actions - Linux Build
run-name: ${{ github.actor }} is building 8088 BIOS on a Linux host
on:
  pull_request:
    branches:
    - main
jobs:
  build-linux:
    runs-on: ubuntu-slim
    steps:
      - run: echo "The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "This job is now running on a ${{ runner.os }} server hosted by GitHub"
      - run: echo "The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v6
      - run: echo "The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "The workflow is now ready to test your code on the runner."
      - name: Install build tools - CMake and NASM
        run: |
          sudo apt update
          sudo apt -y install cmake nasm
      - name: Build 8088 BIOS
        run: |
          cd ${{ github.workspace }}/binaries
          cmake ..
          make
      - name: List output files
        run: ls -l ${{ github.workspace }}/binaries
      - run: echo "This job's status is ${{ job.status }}."
